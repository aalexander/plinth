name: Smoke

# Real-run layer validation on the project's own hardware — the automated
# supply side of the run gate. Runs the set-once smoke_cmd from .plinth/config
# on a self-hosted runner (MANUAL: "The smoke runner"), so execution receipts
# generate on every PR without waiting on a human.
# Per-project file (never overwritten). Not a required check by default —
# make it required in branch protection once it has run green.
#
# A github-hosted `precheck` decides whether there is anything to smoke BEFORE
# any self-hosted runner is requested. With no smoke_cmd configured, the
# self-hosted `smoke` job is SKIPPED (never queued) — so a repo without a
# plinth-smoke runner does NOT hang a PR waiting for a runner that will never
# arrive. Enable smoke by setting smoke_cmd in .plinth/config AND registering a
# self-hosted runner labeled `plinth-smoke`.
# SECURITY: self-hosted runners execute PR code on your machine. Keep the
# repo private (no fork PRs), or restrict who can trigger workflows.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  precheck:
    # github-hosted: no self-hosted runner needed just to decide run/skip.
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: decide
        run: |
          set -euo pipefail
          base="${GITHUB_BASE_REF:-main}"
          git fetch --depth 1 origin "$base" 2>/dev/null || true
          cmd="$(git show "origin/${base}:.plinth/config" 2>/dev/null \
                 | sed -n 's/^smoke_cmd[[:space:]]*=[[:space:]]*//p' | head -1)"
          [ -n "$cmd" ] || cmd="$(sed -n 's/^smoke_cmd[[:space:]]*=[[:space:]]*//p' .plinth/config 2>/dev/null | head -1)"
          if [ -n "$cmd" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "smoke_cmd is set — dispatching the self-hosted smoke job."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "no smoke_cmd in .plinth/config — smoke skipped (green no-op). No self-hosted runner requested."
          fi

  smoke:
    needs: precheck
    if: needs.precheck.outputs.run == 'true'
    runs-on: [self-hosted, plinth-smoke]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke_cmd (execution evidence, not narration)
        run: |
          set -euo pipefail
          # SECURITY (manual security review of anvil PR #1): the command is
          # read from the BASE branch, never the PR — a PR must not choose
          # what executes on this host. PR code still runs UNDER that command;
          # self-hosted smoke assumes a private, no-fork repo where every PR
          # already passed the gated loop.
          git fetch --depth 1 origin "${GITHUB_BASE_REF:-main}" 2>/dev/null || true
          cmd="$(git show "origin/${GITHUB_BASE_REF:-main}:.plinth/config" 2>/dev/null \
                 | sed -n 's/^smoke_cmd[[:space:]]*=[[:space:]]*//p' | head -1)"
          if [ -z "$cmd" ]; then
            echo "no smoke_cmd in the BASE branch's .plinth/config — nothing to run (green no-op)"
            exit 0
          fi
          echo "smoke: $cmd"
          if command -v plinth >/dev/null 2>&1; then
            plinth smoke . -- sh -c "$cmd"
          else
            sh -c "$cmd"
          fi
      - name: Upload receipt + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-receipt
          path: |
            .plinth/session/run/**/receipt.json
            .plinth/session/run/**/smoke-*.log
          if-no-files-found: ignore

name: CI

# Zero-edit by default: OWNER is auto-injected by `plinth init`; checks
# auto-detect the stack at runtime (see plinth-checks.yml in the Plinth repo).
# To customize: replace the `checks` job with explicit steps — this file is
# per-project and never overwritten by plinth update.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# The floor's scanners need these (gitleaks comments on PRs; osv's reusable
# workflow declares security-events even with SARIF upload off). Called
# workflows can only narrow permissions, so the grant must live here.
permissions:
  contents: read
  pull-requests: write
  actions: read
  security-events: write

jobs:
  # These call Plinth's reusable workflows by IMMUTABLE COMMIT SHA — no mutable tag
  # to trust, nothing to suppress. `plinth init` pins the SHA to the exact Plinth
  # release it installed from (the `# vX` comment tracks which); the shipped default
  # below is the latest release at authoring time, used as-is if init can't resolve
  # HEAD. To adopt a newer Plinth, replace the SHA with that release's commit
  # (`plinth update` never rewrites this per-project file).
  floor:
    uses: OWNER/plinth/.github/workflows/plinth-floor.yml@259ae5bcbb4e502be570303a427af39fe91a686e # v4.1.9 (plinth init repins)

  checks:
    uses: OWNER/plinth/.github/workflows/plinth-checks.yml@259ae5bcbb4e502be570303a427af39fe91a686e # v4.1.9 (plinth init repins)
    # For Apple-Silicon parity (e.g. Anvil), uncomment:
    # with:
    #   runner: macos-latest

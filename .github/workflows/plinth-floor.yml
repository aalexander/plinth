# Plinth deterministic floor — reusable workflow.
# Called by project repos via:
#   jobs:
#     floor:
#       uses: OWNER/plinth/.github/workflows/plinth-floor.yml@v4.0
# checkout in a called workflow checks out the CALLER's repo, so scanners run
# against the project's code.
name: Plinth Floor

on:
  workflow_call:

# Permissions live at JOB level, deliberately: a workflow-level block here
# narrows every job, and the nested osv reusable workflow then requests
# security-events/actions permissions its caller no longer holds — GitHub
# refuses to start the whole workflow (anvil PR #1: CI startup_failure).
# The CALLER (template ci.yml) must grant the union; jobs narrow from there.

# Pin policy (learned the hard way — osv retired its v1 tag mid-flight and
# broke every floor run): third-party actions are pinned to EXACT released
# versions, never floating majors. Bump deliberately via a plinth release.
jobs:
  secrets:
    runs-on: ubuntu-latest
    # gitleaks' PR scan calls the GitHub API on the PR (anvil PR #1:
    # "Resource not accessible by integration") — needs pull-requests: write.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # semgrep/semgrep-action is archived; the supported path is semgrep's own
  # container image. :latest is a deliberate exception to the pin policy —
  # the image tag always exists, whereas a pinned archived action can vanish.
  sast:
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - run: semgrep scan --metrics=off --error --config p/owasp-top-ten --config p/security-audit .

  # osv v2 dropped the configurable root action; the documented usage is its
  # reusable workflow (nested reusable calls are fine: ci.yml -> floor -> osv).
  # upload-sarif off: Code Scanning upload requires Advanced Security on
  # private repos and would fail the job for reasons unrelated to vulns.
  dependencies:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: "-r ./"
      upload-sarif: false

  # The hard guarantee behind guard.sh's heuristics: version-pinned tooling in
  # the project must be byte-identical to the pinned Plinth release. Local
  # forgery (however obfuscated) is caught here, at the merge boundary.
  # Requires the plinth repo to be readable by this runner (public, or same
  # owner + PAT) and release tags (v<VERSION>). Known limit: a .plinth-version
  # downgrade pins to an older-but-valid release — reviewers should treat any
  # .plinth-version change outside a plinth-update commit as tampering.
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Verify version-pinned Plinth tooling matches the pinned release
        run: |
          set -euo pipefail
          ver="$(cat .plinth-version 2>/dev/null || true)"
          [ -n "$ver" ] || { echo "::error::no .plinth-version — not a Plinth project?"; exit 1; }
          git clone --depth 1 --branch "v${ver}" \
            "https://github.com/${{ github.repository_owner }}/plinth" /tmp/plinth \
            || { echo "::error::cannot fetch plinth@v${ver} — missing tag, or plinth repo not readable from Actions"; exit 1; }
          fail=0
          check() {  # check <plinth-shared-path> <project-path>
            # Skip files the PINNED release predates (version skew) — there is
            # nothing to compare. If the release ships the file but the project
            # deleted it, cmp still fails below (that IS tampering).
            [ -f "/tmp/plinth/$1" ] || return 0
            # cmp/-f follow symlinks: a pinned path committed as a SYMLINK (e.g. into the
            # /tmp/plinth clone this job just made) could pass the byte check while the
            # repo actually ships a link under external control. Reject the node type.
            if [ -L "$2" ]; then
              echo "::error file=$2::version-pinned path is a SYMLINK — must be a regular committed file"
              fail=1; return 0
            fi
            if ! cmp -s "/tmp/plinth/$1" "$2"; then
              echo "::error file=$2::differs from plinth v${ver} ($1) — version-pinned tooling was modified"
              fail=1
            fi
          }
          check shared/plinth-rules.md            .plinth/plinth-rules.md
          check shared/MODELS.md                  .plinth/MODELS.md
          # v4.4 contract split: reviewer contract -> .plinth/reviewer.md; root AGENTS.md
          # and CLAUDE.md are the byte-identical driver shell. All version-pinned and verified
          # UNCONDITIONALLY — no marker guard (a project could delete the marker to evade). A
          # pre-v4.4 project mid-migration with a preserved CUSTOM CLAUDE.md will fail here
          # until it finishes migrating (move notes to .plinth/DRIVER-project.md, delete
          # CLAUDE.md, re-run `plinth update` to regenerate the shell) — the check IS the
          # pressure to complete it.
          #
          # AGENTS.md is verified against BOTH pinned sources, exactly one of which exists per
          # pinned release (check() skips the absent one): a pre-v4.4 pin ships shared/AGENTS.md
          # (the reviewer contract lived at root) and NO driver-shell.md, so the first line
          # verifies it and the second skips; a v4.4+ pin ships driver-shell.md and renamed
          # AGENTS.md -> reviewer.md, so the first skips and the second verifies. Without the
          # shared/AGENTS.md fallback a pre-v4.4 pin's root AGENTS.md would go UNVERIFIED.
          check shared/reviewer.md                .plinth/reviewer.md
          check shared/AGENTS.md                  AGENTS.md
          check shared/driver-shell.md            AGENTS.md
          check shared/driver-shell.md            CLAUDE.md
          check shared/.plinth/review.sh          .plinth/review.sh
          check shared/.plinth/risk-classify.sh   .plinth/risk-classify.sh
          check shared/.plinth/lane-guard.sh       .plinth/lane-guard.sh
          check shared/.plinth/review-schema.json .plinth/review-schema.json
          check shared/.claude/hooks/guard.sh         .claude/hooks/guard.sh
          check shared/.claude/hooks/session-start.sh .claude/hooks/session-start.sh
          check shared/.claude/hooks/review-gate.sh   .claude/hooks/review-gate.sh
          check shared/.claude/hooks/pulse.sh         .claude/hooks/pulse.sh
          check shared/.claude/agents/grok-implementer.md  .claude/agents/grok-implementer.md
          check shared/.claude/agents/codex-implementer.md .claude/agents/codex-implementer.md
          # Pinned EXECUTABLES are executed directly (./.plinth/review.sh, the lane agents'
          # .plinth/lane-guard.sh calls, the .claude hooks). cmp verifies bytes but not MODE:
          # committing the pinned bytes at 0644 would pass the byte check while every exec
          # fails. Absence is already caught by check() above, so only mode is tested here.
          checkx() {  # checkx <project-path>
            [ -f "$1" ] || return 0
            if [ -L "$1" ]; then
              echo "::error file=$1::version-pinned executable is a SYMLINK — must be a regular committed file"
              fail=1; return 0
            fi
            if [ ! -x "$1" ]; then
              echo "::error file=$1::version-pinned executable is not executable (mode) — direct exec (lanes/review/hooks) would fail"
              fail=1
            fi
          }
          checkx .plinth/review.sh
          checkx .plinth/risk-classify.sh
          checkx .plinth/lane-guard.sh
          checkx .claude/hooks/guard.sh
          checkx .claude/hooks/session-start.sh
          checkx .claude/hooks/review-gate.sh
          checkx .claude/hooks/pulse.sh
          exit "$fail"

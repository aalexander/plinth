# Plinth review-receipt verification — the hard close on the risk-routing TOCTOU
# (red-team: "approve a benign diff locally, swap the payload before merge").
# review.sh writes .plinth/review-receipt.json binding {tier, diff_digest} of the
# reviewed diff (the digest EXCLUDES the receipt itself). This job independently
# recomputes both from the actual PR diff using the pinned, byte-verified
# classifier and fails on any mismatch — so a locally-claimed Tier 0 that is
# actually code, or a post-review payload swap, cannot merge.
name: Plinth Review Receipt

on:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Recompute tier + digest and verify the receipt
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          # Defensive: this check is meaningful only on a PR (needs a base_ref).
          # On push/other events, skip rather than diff against an empty base.
          if [ -z "${BASE_REF:-}" ]; then echo "No base_ref (not a PR event) — skipping receipt verification."; exit 0; fi
          receipt=.plinth/review-receipt.json
          base="origin/${BASE_REF:-main}"
          git rev-parse --verify --quiet "$base" >/dev/null || base="${BASE_REF:-main}"
          # Binding diff = merge diff EXCLUDING the receipt file (same as review.sh).
          bind_diff="$(git diff "${base}...HEAD" -- . ":(exclude)${receipt}")"
          dgst="$(printf '%s' "$bind_diff" | sha256sum | cut -d' ' -f1)"
          tier="$(BASE="${BASE_REF:-main}"; ./.plinth/risk-classify.sh "${BASE_REF:-main}" | jq -r '.tier')"

          if [ ! -f "$receipt" ]; then
            if [ "$tier" = "0" ] && [ -z "$bind_diff" ]; then
              echo "No receipt and empty non-doc diff — nothing to verify."; exit 0
            fi
            echo "::error::No .plinth/review-receipt.json, but the change is Tier ${tier}. Run ./.plinth/review.sh and commit the receipt."; exit 1
          fi
          rtier="$(jq -r '.tier' "$receipt")"; rdig="$(jq -r '.diff_digest' "$receipt")"; rverd="$(jq -r '.verdict' "$receipt")"

          fail=0
          [ "$rverd" = "APPROVED" ] || { echo "::error::receipt verdict is '$rverd', not APPROVED"; fail=1; }
          if [ "$rdig" != "$dgst" ]; then
            echo "::error::diff_digest mismatch — the reviewed diff is NOT the merge diff (post-review payload swap?). receipt=$rdig recomputed=$dgst"; fail=1
          fi
          if [ "$rtier" != "$tier" ]; then
            echo "::error::tier mismatch — receipt claims Tier $rtier, classifier says Tier $tier (tier downgrade?)"; fail=1
          fi
          [ "$fail" = "0" ] && echo "Receipt verified: Tier $tier, digest ${dgst:0:12}, APPROVED, binds the merge diff."
          exit "$fail"

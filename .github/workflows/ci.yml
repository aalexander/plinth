name: CI

# Zero-edit by default: OWNER is auto-injected by `plinth init`; checks
# auto-detect the stack at runtime (see plinth-checks.yml in the Plinth repo).
# To customize: replace the `checks` job with explicit steps — this file is
# per-project and never overwritten by plinth update.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# The floor's scanners need these (gitleaks comments on PRs; osv's reusable
# workflow declares security-events even with SARIF upload off). Called
# workflows can only narrow permissions, so the grant must live here.
permissions:
  contents: read
  pull-requests: write
  actions: read
  security-events: write

jobs:
  # CI-floor independence. The Plinth repo IS Plinth, so its own plinth-floor.yml
  # is editable in any PR — which means a required floor called by LOCAL path would
  # let a PR weaken the very scanners gating its own merge (self-referential gate).
  # So the required `floor` pins the PREVIOUS release's floor by IMMUTABLE SHA: an
  # independent gate a same-PR floor edit cannot touch. The `floor-current` job then
  # runs the floor AS EDITED IN THIS PR, so floor changes are still exercised in CI —
  # the gate stays independent AND the current floor gets tested. Repin the SHA each
  # release. Downstream projects pin a Plinth release the same way (see templates/ci.yml).
  floor:
    uses: aalexander/plinth/.github/workflows/plinth-floor.yml@259ae5bcbb4e502be570303a427af39fe91a686e # v4.1.9

  floor-current:
    uses: ./.github/workflows/plinth-floor.yml

  checks:
    uses: ./.github/workflows/plinth-checks.yml
    # For Apple-Silicon parity (e.g. Anvil), uncomment:
    # with:
    #   runner: macos-latest

name: CI

# Zero-edit by default: OWNER is auto-injected by `plinth init`; checks
# auto-detect the stack at runtime (see plinth-checks.yml in the Plinth repo).
# To customize: replace the `checks` job with explicit steps — this file is
# per-project and never overwritten by plinth update.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# The floor's scanners need these (gitleaks comments on PRs; osv's reusable
# workflow declares security-events even with SARIF upload off). Called
# workflows can only narrow permissions, so the grant must live here.
permissions:
  contents: read
  pull-requests: write
  actions: read
  security-events: write

jobs:
  # Required-gate independence. The Plinth repo IS Plinth, so its own plinth-floor.yml
  # and plinth-checks.yml are editable in any PR — a required gate called by LOCAL path
  # would let a PR weaken the very scanners/checks gating its own merge (self-referential
  # gate). SETUP.md/MANUAL.md tell operators to require BOTH `floor` and `checks`, so BOTH
  # pin the PREVIOUS release by IMMUTABLE SHA: independent gates a same-PR edit cannot
  # touch. The `-current` twins run the floor/checks AS EDITED IN THIS PR, so the edits are
  # still exercised in CI — the required gate stays independent AND the current version gets
  # tested. The required gate INTENTIONALLY trails by one release (it pins the latest TAGGED
  # release, not this branch — a not-yet-existent SHA can't be pinned, and pinning HEAD would
  # let a same-PR edit weaken the gate). So this stays at the last tag until the NEXT release is
  # cut: after tagging v<this release>, bump both SHAs to it (release-flow close-out; see
  # .plinth/NEEDS-HUMAN.md). Downstream pins a Plinth release the same way (see templates/ci.yml).
  # Require `floor` and `checks` (the pinned jobs), not the `-current` twins.
  floor:
    uses: aalexander/plinth/.github/workflows/plinth-floor.yml@5a39ab334219b389c40885b88076774bfbcf2ebf # v4.4.0

  floor-current:
    uses: ./.github/workflows/plinth-floor.yml

  checks:
    uses: aalexander/plinth/.github/workflows/plinth-checks.yml@5a39ab334219b389c40885b88076774bfbcf2ebf # v4.4.0

  checks-current:
    uses: ./.github/workflows/plinth-checks.yml
    # For Apple-Silicon parity (e.g. Anvil), uncomment:
    # with:
    #   runner: macos-latest

name: CI

# Zero-edit by default: OWNER is auto-injected by `plinth init`; checks
# auto-detect the stack at runtime (see plinth-checks.yml in the Plinth repo).
# To customize: replace the `checks` job with explicit steps — this file is
# per-project and never overwritten by plinth update.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# The floor's scanners need these (gitleaks comments on PRs; osv's reusable
# workflow declares security-events even with SARIF upload off). Called
# workflows can only narrow permissions, so the grant must live here.
permissions:
  contents: read
  pull-requests: write
  actions: read
  security-events: write

jobs:
  # These call Plinth's reusable workflows by RELEASE TAG (@v<VERSION>) — the tag
  # IS the pin to a Plinth release (set at init, bumped deliberately when you adopt
  # a new Plinth version; `plinth update` never touches this per-project file), so
  # it cannot be SHA-pinned. nosemgrep the mutable-action-tag rule on THESE lines
  # only; it stays active for every third-party action a project adds.
  floor:
    uses: aalexander/plinth/.github/workflows/plinth-floor.yml@v4.0.1 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag

  checks:
    uses: aalexander/plinth/.github/workflows/plinth-checks.yml@v4.0.1 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
    # For Apple-Silicon parity (e.g. Anvil), uncomment:
    # with:
    #   runner: macos-latest

          python3 -c 'import sys,re; s=open(sys.argv[1]).read(); sys.stdout.write(re.sub(r"(## Project-specific notes)", "- CUSTOM RULE: always run make lint.\n\n\\1", s, count=1))' "$OLDT" > "$MA/CLAUDE.md"
          "$GITHUB_WORKSPACE/bin/plinth" update "$MA" >/dev/null 2>&1

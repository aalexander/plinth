          cat > "$RB4/codex" <<CX4
          #!/usr/bin/env bash
          printf '%s\n' "\$*" >> "$CAP4"
          out=""; prev=""; for a in "\$@"; do [ "\$prev" = "-o" ] && out="\$a"; prev="\$a"; done

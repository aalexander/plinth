# Plinth canary — external-drift detector. The world moves under pinned
# references (action tags retire, images change, runners update); this makes
# rot surface on a schedule instead of inside someone's real PR (the way
# osv-scanner-action@v1's retirement broke anvil PR #1 mid-merge).
name: Plinth Canary

on:
  schedule:
    - cron: "0 14 * * 1"   # Mondays 14:00 UTC
  workflow_dispatch:
  pull_request:
    branches: [main]       # scaffold probes RUN on PRs (red on failure); gating needs the
                           # scaffold job in branch-protection required checks. drift job: schedule-only.

permissions:
  contents: read
  pull-requests: write
  actions: read
  security-events: write

jobs:
  # Do all pinned floor actions still resolve and run? Drift check — schedule/
  # dispatch only; on a PR the project's own ci.yml already runs the floor.
  floor:
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/plinth-floor.yml

  # Does the harness itself still scaffold and fail loud correctly?
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Syntax-check every shipped script
        run: |
          set -euo pipefail
          for f in shared/.claude/hooks/*.sh shared/.plinth/review.sh shared/.plinth/risk-classify.sh bin/plinth; do bash -n "$f"; done
      - name: Scaffold a fixture project and exercise the free paths
        run: |
          set -euo pipefail
          # Fresh runners set no git identity, and git >= 2.54 refuses to commit
          # with an empty ident — the fixtures below commit, so set one (same fix
          # as smoke.yml). Global, so it covers every fixture repo this job creates.
          git config --global user.email "canary@plinth.ci"
          git config --global user.name  "plinth canary"
          mkdir /tmp/fx && cd /tmp/fx && git init -qb main .
          "$GITHUB_WORKSPACE/bin/plinth" init /tmp/fx
          # init must SHA-pin the reusable-workflow refs (immutable, no mutable tag,
          # no scanner suppression) to the SHA of the Plinth checkout it installed.
          PSHA="$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD)"
          grep -q "plinth-floor.yml@${PSHA}" .github/workflows/ci.yml || { echo "::error::init did not SHA-pin the reusable FLOOR ref to the plinth checkout SHA"; exit 1; }
          grep -q "plinth-checks.yml@${PSHA}" .github/workflows/ci.yml || { echo "::error::init did not SHA-pin the reusable CHECKS ref to the plinth checkout SHA"; exit 1; }
          grep -Eq 'plinth-(floor|checks)\.yml@v[0-9]' .github/workflows/ci.yml && { echo "::error::init left a mutable @v tag on a reusable-workflow ref"; exit 1; } || true
          grep -q nosemgrep .github/workflows/ci.yml && { echo "::error::generated ci.yml still suppresses the mutable-action-tag rule"; exit 1; } || true
          # v4 model wiring: the scaffold's audit seat is claude — a different family than
          # BOTH the default codex reviewer and the v4 grok driver (MODELS.md seat table).
          grep -q '^audit_vendor = claude$' .plinth/config || { echo "::error::scaffold did not set audit_vendor = claude (v4 default)"; exit 1; }
          # generated ci.yml must preserve the template's mode (edit_file's mktemp is 0600) — it must
          # stay group/other-readable, not 0600:
          cim="$(stat -c '%a' .github/workflows/ci.yml 2>/dev/null || stat -f '%Lp' .github/workflows/ci.yml 2>/dev/null)"
          tmpl="$GITHUB_WORKSPACE/templates/.github/workflows/ci.yml"
          tim="$(stat -c '%a' "$tmpl" 2>/dev/null || stat -f '%Lp' "$tmpl" 2>/dev/null)"
          [ "$cim" = "$tim" ] || { echo "::error::generated ci.yml mode ($cim) != template mode ($tim) — edit_file did not preserve the source mode"; exit 1; }
          # edit_file must FAIL CLOSED if it cannot apply the source mode — otherwise the 0600 mktemp
          # temp is moved into place and the file is silently left group/other-UNREADABLE (the exact
          # regression mode-preservation exists to prevent). Inject a chmod that fails ONLY for the
          # .plinth-tmp temp (pass-through otherwise) and assert init aborts non-zero:
          CHB="$(mktemp -d)"
          printf '%s\n' '#!/usr/bin/env bash' 'for a in "$@"; do case "$a" in *.plinth-tmp.*) exit 1;; esac; done' 'exec /bin/chmod "$@"' > "$CHB/chmod"
          chmod +x "$CHB/chmod"
          EFI="$(mktemp -d)"; ( cd "$EFI"; git init -qb main . >/dev/null
            r=0; PATH="$CHB:$PATH" "$GITHUB_WORKSPACE/bin/plinth" init "$EFI" >/dev/null 2>&1 || r=$?
            [ "$r" != 0 ] || { echo "::error::edit_file did not fail closed when chmod could not set the source mode (would leave a 0600/unreadable file)"; exit 1; } )
          # v4 advisor seat is scaffolded LIVE (advise is non-blocking; a missing model just
          # reports unavailable); the reviewer tier knobs ship COMMENTED — GPT-5.6 access is
          # PER-ACCOUNT (GA July 9 2026; Codex CLI >= 0.144.0) and an ACTIVE line on an
          # ineligible account would make the reviewer FAIL LOUD, not fall back.
          grep -q '^advisor_model = opus$' .plinth/config || { echo "::error::scaffold did not set the v4 advisor peer model (advisor_model = opus)"; exit 1; }
          grep -q '^audit_model = opus$' .plinth/config || { echo "::error::scaffold did not pin the v4 audit seat model (audit_model = opus) — the CLI default could audit with a different model"; exit 1; }
          # plinth UPDATE must WARN (loudly, with the repin command) when an existing project's
          # reusable-workflow refs are STALE — without rewriting the operator-owned ci.yml (contract):
          RPD="$(mktemp -d)"; ( cd "$RPD"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPD" >/dev/null 2>&1 )
          PSHA="$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD)"
          # a stale CHECKS ref ALONE (floor current) must still warn — floor and checks are
          # independent gates (round-65 sibling):
          sed -i "s|plinth-checks.yml@${PSHA}|plinth-checks.yml@v3.14|" "$RPD/.github/workflows/ci.yml"
          ( cd "$RPD" && git add -A && git commit -qm base >/dev/null )
          rpout="$("$GITHUB_WORKSPACE/bin/plinth" update "$RPD" 2>&1)"
          printf '%s' "$rpout" | grep -q "pins the reusable" || { echo "::error::plinth update did not WARN about a stale reusable CHECKS ref (floor current)"; exit 1; }
          # the warning MUST carry a usable repin command: the sed one-liner AND this release's SHA:
          # the repin sed command AND this release's SHA must occur on the SAME line, and for a
          # checks-ONLY stale it must target plinth-checks only (never rewrite the current floor ref):
          printf '%s' "$rpout" | grep -F "$PSHA" | grep -q "sed -i.bak.*plinth-checks" || { echo "::error::stale checks-only warning lacks a repin command targeting plinth-checks with this SHA"; exit 1; }
          printf '%s' "$rpout" | grep -q 'sed -i.bak.*plinth-(floor|checks)' && { echo "::error::checks-only repin command wrongly also rewrites the current floor ref"; exit 1; } || true
          grep -q "plinth-checks.yml@v3.14" "$RPD/.github/workflows/ci.yml" || { echo "::error::plinth update REWROTE the operator-owned ci.yml (contract: it must not)"; exit 1; }
          # a DECOY current ref in a comment must NOT suppress the warning while the real uses: is stale:
          RPD3="$(mktemp -d)"; ( cd "$RPD3"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPD3" >/dev/null 2>&1 )
          sed -i "s|plinth-floor.yml@${PSHA}|plinth-floor.yml@v3.14|; s|plinth-checks.yml@${PSHA}|plinth-checks.yml@v3.14|" "$RPD3/.github/workflows/ci.yml"
          printf '          # decoy plinth-floor.yml@%s plinth-checks.yml@%s\n' "$PSHA" "$PSHA" >> "$RPD3/.github/workflows/ci.yml"
          ( cd "$RPD3" && git add -A && git commit -qm base >/dev/null )
          rp3="$("$GITHUB_WORKSPACE/bin/plinth" update "$RPD3" 2>&1)"
          printf '%s' "$rp3" | grep -q "pins the reusable" || { echo "::error::a decoy comment ref suppressed the stale-ref warning (grep not anchored to uses:)"; exit 1; }
          # a decoy NON-GATING job with a current uses: ref must not suppress the warning either:
          RPD4="$(mktemp -d)"; ( cd "$RPD4"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPD4" >/dev/null 2>&1 )
          sed -i "s|plinth-floor.yml@${PSHA}|plinth-floor.yml@v3.14|" "$RPD4/.github/workflows/ci.yml"
          printf '  decoyjob:\n    uses: aalexander/plinth/.github/workflows/plinth-floor.yml@%s\n' "$PSHA" >> "$RPD4/.github/workflows/ci.yml"
          ( cd "$RPD4" && git add -A && git commit -qm base >/dev/null )
          rp4="$("$GITHUB_WORKSPACE/bin/plinth" update "$RPD4" 2>&1)"
          printf '%s' "$rp4" | grep -q "pins the reusable" || { echo "::error::a decoy non-gating job with a current uses: ref suppressed the stale-ref warning"; exit 1; }
          # MIXED: stale reusable floor + a CUSTOM checks gate (checks uses: is NOT plinth-checks.yml) —
          # warn about the floor ref ONLY; the suggested sed must target floor only. Repoint the checks
          # reusable ref to a non-plinth workflow (that makes checks a custom gate, cstale=0):
          RPD5="$(mktemp -d)"; ( cd "$RPD5"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPD5" >/dev/null 2>&1 )
          sed -i "s|plinth-floor.yml@${PSHA}|plinth-floor.yml@v3.14|" "$RPD5/.github/workflows/ci.yml"
          sed -i "s|[^ ]*plinth-checks.yml@[^ ]*|./.github/workflows/my-checks.yml|" "$RPD5/.github/workflows/ci.yml"
          ( cd "$RPD5" && git add -A && git commit -qm base >/dev/null )
          rp5="$("$GITHUB_WORKSPACE/bin/plinth" update "$RPD5" 2>&1)"
          printf '%s' "$rp5" | grep -q "reusable floor ref" || { echo "::error::mixed stale-floor+custom-checks did not name the floor ref only: $(printf '%s' "$rp5" | grep -i reusable | head -1)"; exit 1; }
          printf '%s' "$rp5" | grep -q "plinth-checks" && { echo "::error::mixed warning's sed still targets the custom checks ref"; exit 1; } || true
          # current floor + custom checks must NOT warn (nothing reusable is stale):
          RPD6="$(mktemp -d)"; ( cd "$RPD6"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPD6" >/dev/null 2>&1 )
          sed -i "s|[^ ]*plinth-checks.yml@[^ ]*|./.github/workflows/my-checks.yml|" "$RPD6/.github/workflows/ci.yml"
          ( cd "$RPD6" && git add -A && git commit -qm base >/dev/null )
          rp6="$("$GITHUB_WORKSPACE/bin/plinth" update "$RPD6" 2>&1)"
          printf '%s' "$rp6" | grep -q "pins the reusable" && { echo "::error::current-floor + custom-checks falsely warned"; exit 1; } || true
          # and a FULLY-current ci.yml must NOT warn:
          RPD2="$(mktemp -d)"; ( cd "$RPD2"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPD2" >/dev/null 2>&1; git add -A; git commit -qm base >/dev/null )
          rp2="$("$GITHUB_WORKSPACE/bin/plinth" update "$RPD2" 2>&1)"
          printf '%s' "$rp2" | grep -q "pins the reusable" && { echo "::error::plinth update FALSE-warned on a current ci.yml"; exit 1; } || true
          # QUOTED uses: values — a current QUOTED ref must NOT be falsely flagged stale (the char after
          # the SHA is a quote, not whitespace/EOL), and a stale QUOTED ref's repin sed must keep the
          # closing quote (a `[^[:space:]]+` SHA match would swallow it and emit invalid YAML):
          RPDQ="$(mktemp -d)"; ( cd "$RPDQ"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPDQ" >/dev/null 2>&1 )
          # wrap BOTH uses: values in double quotes, keeping the current SHA -> must NOT warn:
          sed -i -E 's#(uses: )(aalexander/plinth[^ ]*)#\1"\2"#' "$RPDQ/.github/workflows/ci.yml"
          ( cd "$RPDQ" && git add -A && git commit -qm base >/dev/null )
          rpq="$("$GITHUB_WORKSPACE/bin/plinth" update "$RPDQ" 2>&1)"
          printf '%s' "$rpq" | grep -q "pins the reusable" && { echo "::error::a CURRENT but QUOTED reusable ref was falsely flagged stale"; exit 1; } || true
          # now make the quoted floor ref STALE -> must warn, and the emitted repin sed must produce valid YAML:
          sed -i "s|plinth-floor.yml@${PSHA}|plinth-floor.yml@v3.14|" "$RPDQ/.github/workflows/ci.yml"
          ( cd "$RPDQ" && git add -A && git commit -qm base >/dev/null )
          rpq2="$("$GITHUB_WORKSPACE/bin/plinth" update "$RPDQ" 2>&1)"
          printf '%s' "$rpq2" | grep -q "pins the reusable" || { echo "::error::a STALE QUOTED reusable floor ref did not warn"; exit 1; }
          # extract the FULL suggested repin command (it spans two lines: the sed + the target path/rm)
          # and RUN it; the result must be valid YAML with the closing quote intact:
          sedcmd="$(printf '%s' "$rpq2" | grep -F 'sed -i.bak')"
          printf '%s' "$sedcmd" | grep -qF "$PSHA" || { echo "::error::stale quoted-ref warning carried no repin command with this SHA"; exit 1; }
          ( cd "$RPDQ" && eval "$sedcmd" )
          ruby -ryaml -e 'YAML.load_file(ARGV[0])' "$RPDQ/.github/workflows/ci.yml" || { echo "::error::the repin sed on a QUOTED ref produced INVALID YAML (swallowed the closing quote)"; exit 1; }
          grep -q "plinth-floor.yml@${PSHA}\"" "$RPDQ/.github/workflows/ci.yml" || { echo "::error::repin did not restore the current SHA with its closing quote on the quoted floor ref"; exit 1; }
          # SINGLE-quoted refs (current must not warn; stale must warn and repin to valid YAML), on the
          # CHECKS gate (the double-quoted case above covered floor):
          RPS="$(mktemp -d)"; ( cd "$RPS"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPS" >/dev/null 2>&1 )
          sed -i -E "s#(uses: )(aalexander/plinth[^ ]*)#\1'\2'#" "$RPS/.github/workflows/ci.yml"
          ( cd "$RPS" && git add -A && git commit -qm base >/dev/null )
          rps="$("$GITHUB_WORKSPACE/bin/plinth" update "$RPS" 2>&1)"
          printf '%s' "$rps" | grep -q "pins the reusable" && { echo "::error::a CURRENT single-quoted reusable ref was falsely flagged stale"; exit 1; } || true
          sed -i "s|plinth-checks.yml@${PSHA}|plinth-checks.yml@v3.14|" "$RPS/.github/workflows/ci.yml"
          ( cd "$RPS" && git add -A && git commit -qm base >/dev/null )
          rps2="$("$GITHUB_WORKSPACE/bin/plinth" update "$RPS" 2>&1)"
          printf '%s' "$rps2" | grep -q "pins the reusable" || { echo "::error::a STALE single-quoted CHECKS ref did not warn"; exit 1; }
          scmd="$(printf '%s' "$rps2" | grep -F 'sed -i.bak')"; ( cd "$RPS" && eval "$scmd" )
          ruby -ryaml -e 'YAML.load_file(ARGV[0])' "$RPS/.github/workflows/ci.yml" || { echo "::error::repin on a SINGLE-quoted ref produced invalid YAML"; exit 1; }
          grep -q "plinth-checks.yml@${PSHA}'" "$RPS/.github/workflows/ci.yml" || { echo "::error::single-quote delimiter not preserved on the checks repin"; exit 1; }
          # a QUOTED JOB KEY ("floor":) with a stale ref must still be discovered and warned:
          RPK="$(mktemp -d)"; ( cd "$RPK"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPK" >/dev/null 2>&1 )
          sed -i 's/^  floor:/  "floor":/' "$RPK/.github/workflows/ci.yml"
          sed -i "s|plinth-floor.yml@${PSHA}|plinth-floor.yml@v3.14|" "$RPK/.github/workflows/ci.yml"
          ( cd "$RPK" && git add -A && git commit -qm base >/dev/null )
          printf '%s' "$("$GITHUB_WORKSPACE/bin/plinth" update "$RPK" 2>&1)" | grep -q "pins the reusable" || { echo "::error::a stale ref under a QUOTED job key was not discovered (awk key match too strict)"; exit 1; }
          # awk robustness (a): a child PROPERTY before `uses:` (permissions/needs/if/strategy) inside
          # the floor job is VALID YAML and must NOT terminate the block and suppress a stale warning —
          # the block-end must compare INDENTATION (a deeper child != a sibling job). Tests the real gap.
          RPI="$(mktemp -d)"; ( cd "$RPI"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPI" >/dev/null 2>&1 )
          python3 - "$RPI/.github/workflows/ci.yml" <<'PYIND'
          import sys
          p=sys.argv[1]; s=open(p).read()
          s=s.replace('\n  floor:\n    uses:', '\n  floor:\n    permissions: read-all\n    uses:')
          open(p,'w').write(s)
          PYIND
          ruby -ryaml -e 'YAML.load_file(ARGV[0])' "$RPI/.github/workflows/ci.yml" || { echo "::error::[test-setup] property-before-uses fixture is invalid YAML"; exit 1; }
          sed -i "s|plinth-floor.yml@${PSHA}|plinth-floor.yml@v3.14|" "$RPI/.github/workflows/ci.yml"
          ( cd "$RPI" && git add -A && git commit -qm base >/dev/null )
          printf '%s' "$("$GITHUB_WORKSPACE/bin/plinth" update "$RPI" 2>&1)" | grep -q "pins the reusable" || { echo "::error::a child property (permissions:) before uses: suppressed the stale warning — awk terminator not indentation-aware"; exit 1; }
          # awk robustness (c): a COMMENTED `# uses: …@<current-sha>` before the ACTIVE stale uses must
          # NOT be captured and suppress the warning (the uses: match must skip comment lines):
          RPC="$(mktemp -d)"; ( cd "$RPC"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPC" >/dev/null 2>&1 )
          python3 - "$RPC/.github/workflows/ci.yml" "$PSHA" <<'PYCMT'
          import sys
          p, sha = sys.argv[1], sys.argv[2]; s = open(p).read()
          s = s.replace('\n  floor:\n    uses:', '\n  floor:\n    # uses: aalexander/plinth/.github/workflows/plinth-floor.yml@%s\n    uses:' % sha, 1)
          s = s.replace('    uses: aalexander/plinth/.github/workflows/plinth-floor.yml@%s' % sha,
                        '    uses: aalexander/plinth/.github/workflows/plinth-floor.yml@v3.14', 1)  # stale ONLY the active line
          open(p, 'w').write(s)
          PYCMT
          ruby -ryaml -e 'YAML.load_file(ARGV[0])' "$RPC/.github/workflows/ci.yml" || { echo "::error::[test-setup] commented-uses fixture is invalid YAML"; exit 1; }
          ( cd "$RPC" && git add -A && git commit -qm base >/dev/null )
          printf '%s' "$("$GITHUB_WORKSPACE/bin/plinth" update "$RPC" 2>&1)" | grep -q "pins the reusable" || { echo "::error::a COMMENTED current uses line before the active stale uses suppressed the warning — awk did not skip the comment"; exit 1; }
          # awk robustness (d): discovery is SCOPED to the top-level jobs: mapping — a same-named key
          # ELSEWHERE (`env:\n  floor: …` before jobs:) must NOT be selected as the floor job and divert
          # discovery past the real stale gate:
          RPE="$(mktemp -d)"; ( cd "$RPE"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPE" >/dev/null 2>&1 )
          python3 -c 'import sys;p=sys.argv[1];s=open(p).read();open(p,"w").write(s.replace("jobs:","env:\n  floor: not-a-job\n\njobs:",1))' "$RPE/.github/workflows/ci.yml"
          ruby -ryaml -e 'YAML.load_file(ARGV[0])' "$RPE/.github/workflows/ci.yml" || { echo "::error::[test-setup] env-decoy fixture invalid YAML"; exit 1; }
          sed -i "s|plinth-floor.yml@${PSHA}|plinth-floor.yml@v3.14|" "$RPE/.github/workflows/ci.yml"
          ( cd "$RPE" && git add -A && git commit -qm base >/dev/null )
          printf '%s' "$("$GITHUB_WORKSPACE/bin/plinth" update "$RPE" 2>&1)" | grep -q "pins the reusable" || { echo "::error::a top-level env: floor key diverted stale-gate discovery from the real jobs.floor gate"; exit 1; }
          # awk robustness (e): the `uses:` match is a line-start KEY — a `name: \"uses: …\"` string
          # inside the floor job before its real uses: must NOT be captured as the ref:
          RPN="$(mktemp -d)"; ( cd "$RPN"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPN" >/dev/null 2>&1 )
          python3 -c 'import sys;p=sys.argv[1];s=open(p).read();open(p,"w").write(s.replace("\n  floor:\n    uses:","\n  floor:\n    name: \"uses: compatibility floor\"\n    uses:"))' "$RPN/.github/workflows/ci.yml"
          ruby -ryaml -e 'YAML.load_file(ARGV[0])' "$RPN/.github/workflows/ci.yml" || { echo "::error::[test-setup] name-uses-string fixture invalid YAML"; exit 1; }
          sed -i "s|plinth-floor.yml@${PSHA}|plinth-floor.yml@v3.14|" "$RPN/.github/workflows/ci.yml"
          ( cd "$RPN" && git add -A && git commit -qm base >/dev/null )
          printf '%s' "$("$GITHUB_WORKSPACE/bin/plinth" update "$RPN" 2>&1)" | grep -q "pins the reusable" || { echo "::error::a name: \"uses: …\" STRING before the real uses: was captured as the ref (uses match not a line-start key)"; exit 1; }
          # awk robustness (f): a same-named MATRIX key at a deeper indent must NOT divert discovery —
          # only a DIRECT-child job of jobs: and a DIRECT-child uses: count. A `setup` job with
          # `strategy.matrix.floor` before the real floor gate must still find the real stale gate:
          RPMX="$(mktemp -d)"; ( cd "$RPMX"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPMX" >/dev/null 2>&1 )
          python3 -c '
          import sys
          p=sys.argv[1]; s=open(p).read()
          inject="  setup:\n    strategy:\n      matrix:\n        floor: [a, b]\n    runs-on: ubuntu-latest\n    steps:\n      - run: echo\n"
          open(p,"w").write(s.replace("jobs:\n","jobs:\n"+inject,1))' "$RPMX/.github/workflows/ci.yml"
          ruby -ryaml -e 'YAML.load_file(ARGV[0])' "$RPMX/.github/workflows/ci.yml" || { echo "::error::[test-setup] matrix-decoy fixture invalid YAML"; exit 1; }
          sed -i "s|plinth-floor.yml@${PSHA}|plinth-floor.yml@v3.14|" "$RPMX/.github/workflows/ci.yml"
          ( cd "$RPMX" && git add -A && git commit -qm base >/dev/null )
          printf '%s' "$("$GITHUB_WORKSPACE/bin/plinth" update "$RPMX" 2>&1)" | grep -q "pins the reusable" || { echo "::error::a strategy.matrix.floor key diverted discovery from the real jobs.floor gate (awk not direct-child scoped)"; exit 1; }
          # awk robustness (g): a QUOTED top-level `\"jobs\":` mapping must still be recognized:
          RPQJ="$(mktemp -d)"; ( cd "$RPQJ"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$RPQJ" >/dev/null 2>&1 )
          sed -i 's|^jobs:|"jobs":|' "$RPQJ/.github/workflows/ci.yml"
          ruby -ryaml -e 'YAML.load_file(ARGV[0])' "$RPQJ/.github/workflows/ci.yml" || { echo "::error::[test-setup] quoted-jobs fixture invalid YAML"; exit 1; }
          sed -i "s|plinth-floor.yml@${PSHA}|plinth-floor.yml@v3.14|" "$RPQJ/.github/workflows/ci.yml"
          ( cd "$RPQJ" && git add -A && git commit -qm base >/dev/null )
          printf '%s' "$("$GITHUB_WORKSPACE/bin/plinth" update "$RPQJ" 2>&1)" | grep -q "pins the reusable" || { echo "::error::a quoted top-level \"jobs\": mapping was not recognized (stale gate missed)"; exit 1; }
          # awk robustness (h): inline `# comment` on the jobs:/floor: line, a quoted `"uses":` key, and a
          # deep comment decoy (which must not establish the inferred child indent) must all still find
          # the real stale gate:
          for tweak in 'inline-jobs-comment' 'inline-floor-comment' 'quoted-uses' 'comment-indent'; do

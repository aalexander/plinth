          printf '%s' "$CSEC" | grep -q "INLINED into your" || { echo "::error::inlined reviewer.md lacks the use-the-inlined-copy instruction"; exit 1; }
          printf '%s' "$CSEC" | grep -q "INLINE-ONLY POLICY" || { echo "::error::reviewer prompt missing the unconditional INLINE-ONLY override banner"; exit 1; }

            rm -f .plinth/protected-paths
            # a symlink to a READABLE regular file: [ -f ]/[ -r ] follow it, but git show base: would read the
            # link's TARGET TEXT, not the policy — must still fail closed:
            realpp="$(mktemp)"; printf '(^|/)real\\.txt$\n' > "$realpp"; ln -sf "$realpp" .plinth/protected-paths
            r=0; bash "$LG" snapshot >/dev/null 2>&1 || r=$?; [ "$r" = 5 ] || { echo "::error::snapshot did not fail closed on a protected-paths that is a symlink to a READABLE file (rc=$r)"; exit 1; }
            r=0; bash "$LG" scope HEAD app.py >/dev/null 2>&1 || r=$?; [ "$r" = 5 ] || { echo "::error::scope did not fail closed on a protected-paths symlink-to-readable-file (rc=$r)"; exit 1; }
            rm -f .plinth/protected-paths "$realpp"
            # an UNREADABLE regular file (skipped as root, where mode 000 is still readable) — scope too:
            printf '(^|/)\\.plinth/config$\n' > .plinth/protected-paths
            if [ "$(id -u)" != 0 ]; then
              chmod 000 .plinth/protected-paths
              r=0; bash "$LG" snapshot >/dev/null 2>&1 || r=$?; [ "$r" = 5 ] || { chmod 644 .plinth/protected-paths; echo "::error::snapshot did not fail closed on an UNREADABLE protected-paths (rc=$r)"; exit 1; }
              r=0; bash "$LG" scope HEAD app.py >/dev/null 2>&1 || r=$?; chmod 644 .plinth/protected-paths
              [ "$r" = 5 ] || { echo "::error::scope did not fail closed on an UNREADABLE protected-paths (rc=$r)"; exit 1; }
            fi )
          # protected-paths ALWAYS wins over the SECRET_SAFE template carve-out: a project that deliberately
          # protects .env.example must still have it flagged SENSITIVE (the carve-out only exempts from the
          # builtin secret denylist, never from an explicit protected pattern):
          LGP="$(mktemp -d)"; ( cd "$LGP"; git init -qb main . >/dev/null; git config user.email x@x; git config user.name x
            mkdir -p .plinth; printf '(^|/)\\.env\\.example$\n' > .plinth/protected-paths
            printf 'v\n' > .env.example; git add -A; git commit -qm base >/dev/null
            bash "$LG" snapshot | grep -q 'env.example' || { echo "::error::an EXPLICITLY protected .env.example was exempted by the SECRET_SAFE carve-out — protected-paths must win"; exit 1; } )
          # SELF-REFERENTIAL NARROWING: a lane cannot edit .plinth/protected-paths to un-protect a path and then
          # slip that path through (even in no-snapshot mode) — scope reads the POLICY from the ratified base:
          LGN="$(mktemp -d)"; ( cd "$LGN"; git init -qb main . >/dev/null; git config user.email x@x; git config user.name x
            mkdir -p .plinth; printf '(^|/)\\.plinth/protected-paths$\n(^|/)secret\\.txt$\n' > .plinth/protected-paths
            echo real > secret.txt; echo a > app.py; git add -A; git commit -qm base >/dev/null
            printf '# narrowed away\n' > .plinth/protected-paths; echo STOLEN > secret.txt   # lane narrows policy + edits the secret
            r=0; bash "$LG" scope HEAD app.py secret.txt .plinth/protected-paths >/dev/null 2>&1 || r=$?
            [ "$r" = 4 ] || { echo "::error::scope let a lane NARROW protected-paths and edit the un-protected secret (rc=$r) — must read policy from base"; exit 1; } )
          # plinth advise applies the verdict-not-survey discipline to EVERY vendor (claude=arg, codex=stdin, grok/agy=arg):
          adv_cap() {  # <vendor> <how: last|afterp|stdin>
            local v="$1" how="$2" B cap R; B="$(mktemp -d)"; cap="$B/p"
            case "$how" in
              stdin)  printf '#!/usr/bin/env bash\ncat > "%s"\necho advice\n' "$cap" > "$B/$v" ;;
              afterp) printf '#!/usr/bin/env bash\nprev=""; for a in "$@"; do [ "$prev" = -p ] && printf "%%s" "$a" > "%s"; prev="$a"; done\necho advice\n' "$cap" > "$B/$v" ;;
              last)   printf '#!/usr/bin/env bash\nfor a in "$@"; do last="$a"; done; printf "%%s" "$last" > "%s"\necho advice\n' "$cap" > "$B/$v" ;;
            esac
            chmod +x "$B/$v"
            R="$(mktemp -d)"; ( cd "$R"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$R" >/dev/null 2>&1
              grep -v '^advisor_vendor' .plinth/config > .plinth/config.t && mv .plinth/config.t .plinth/config
              printf 'advisor_vendor = %s\n' "$v" >> .plinth/config
              PATH="$B:$PATH" "$GITHUB_WORKSPACE/bin/plinth" advise "route the auth module" >/dev/null 2>&1 || true )
            grep -q "Give a VERDICT, not a survey" "$cap" || { echo "::error::advise: $v did not receive the verdict-not-survey discipline"; exit 1; }
            grep -q "route the auth module" "$cap" || { echo "::error::advise: $v dropped the question"; exit 1; }
          }
          adv_cap claude last
          adv_cap codex stdin
          adv_cap grok afterp
          adv_cap agy afterp
          # --impactful adds the weighting line, on a NON-claude vendor (grok, arg-passed):
          GIB="$(mktemp -d)"; gcap="$GIB/p"
          printf '#!/usr/bin/env bash\nprev=""; for a in "$@"; do [ "$prev" = -p ] && printf "%%s" "$a" > "%s"; prev="$a"; done\necho advice\n' "$gcap" > "$GIB/grok"; chmod +x "$GIB/grok"
          GIR="$(mktemp -d)"; ( cd "$GIR"; git init -qb main . >/dev/null; "$GITHUB_WORKSPACE/bin/plinth" init "$GIR" >/dev/null 2>&1
            grep -v '^advisor_vendor' .plinth/config > .plinth/config.t && mv .plinth/config.t .plinth/config
            printf 'advisor_vendor = grok\n' >> .plinth/config
            PATH="$GIB:$PATH" "$GITHUB_WORKSPACE/bin/plinth" advise --impactful "migrate the DB" >/dev/null 2>&1 || true )
          grep -qi "IMPACTFUL, hard-to-reverse" "$gcap" || { echo "::error::advise --impactful (non-claude vendor) lacks the hard-to-reverse weighting"; exit 1; }
          echo "canary: scaffold + fail-loud + classifier tiers + bypass + tier0-no-codex + audit + smoke-precheck + update-protected-paths + v4.4.0(contract/isolation/deny-ship/advise/needs-human) OK"

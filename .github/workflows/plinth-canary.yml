# Plinth canary — external-drift detector. The world moves under pinned
# references (action tags retire, images change, runners update); this makes
# rot surface on a schedule instead of inside someone's real PR (the way
# osv-scanner-action@v1's retirement broke anvil PR #1 mid-merge).
name: Plinth Canary

on:
  schedule:
    - cron: "0 14 * * 1"   # Mondays 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read
  security-events: write

jobs:
  # Do all pinned floor actions still resolve and run?
  floor:
    uses: ./.github/workflows/plinth-floor.yml

  # Does the harness itself still scaffold and fail loud correctly?
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check every shipped script
        run: |
          set -euo pipefail
          for f in shared/.claude/hooks/*.sh shared/.plinth/review.sh shared/.plinth/risk-classify.sh bin/plinth; do bash -n "$f"; done
      - name: Scaffold a fixture project and exercise the free paths
        run: |
          set -euo pipefail
          mkdir /tmp/fx && cd /tmp/fx && git init -qb main .
          "$GITHUB_WORKSPACE/bin/plinth" init /tmp/fx
          git add -A && git commit -qm "plinth canary scaffold"
          git checkout -qb feat && echo x > f.txt && git add -A && git commit -qm "canary work"
          # review.sh must fail LOUD (exit 2), never fail open, without codex:
          rc=0; ./.plinth/review.sh nosuchbase >/dev/null 2>&1 || rc=$?
          [ "$rc" -eq 2 ] || { echo "::error::review.sh bad-base path exited $rc (want 2)"; exit 1; }
          echo dirty > f.txt
          rc=0; ./.plinth/review.sh main >/dev/null 2>&1 || rc=$?
          [ "$rc" -eq 2 ] || { echo "::error::review.sh dirty-tree path exited $rc (want 2)"; exit 1; }
          git checkout -- f.txt   # clean the fixture before switching branches
          # Risk classifier tiers: docs => 0, code => 1, tooling => 2. Each probe
          # starts fresh from main (checkout -qB resets the probe branch).
          tier() { git checkout -q main; git checkout -qB probe >/dev/null 2>&1; eval "$1"; git add -A; git commit -qm p >/dev/null; ./.plinth/risk-classify.sh main | jq -r .tier; }
          [ "$(tier 'echo doc > R.md')" = "0" ] || { echo "::error::classifier: docs != Tier 0"; exit 1; }
          [ "$(tier 'echo code > src.py')" = "1" ] || { echo "::error::classifier: code != Tier 1"; exit 1; }
          [ "$(tier 'mkdir -p .claude/hooks; echo x > .claude/hooks/z.sh')" = "2" ] || { echo "::error::classifier: tooling != Tier 2"; exit 1; }
          # Receipt binding: the digest (excluding the receipt) must change when
          # the diff changes — the property the CI receipt verifier enforces.
          git checkout -q main; git checkout -qB rcpt >/dev/null 2>&1; echo v1 > app.py; git add -A; git commit -qm w >/dev/null
          dg() { printf '%s' "$(git diff main...HEAD -- . ':(exclude).plinth/review-receipt.json')" | sha256sum | cut -d' ' -f1; }
          d1="$(dg)"; echo v2 >> app.py; git add -A; git commit -qm tamper >/dev/null; d2="$(dg)"
          [ "$d1" != "$d2" ] || { echo "::error::receipt digest did not change when the diff changed"; exit 1; }
          echo "canary: scaffold + fail-loud + classifier tiers + receipt digest OK"

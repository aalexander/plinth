            printf '# Plinth — Reviewer Contract\n\nYou are an independent adversarial reviewer.\n\nALSO read `.plinth/AGENTS-project.md` and apply every rule in it.\nFIRSTUPGRADE_BASE_RULE: block any eval() call.\n' > AGENTS.md

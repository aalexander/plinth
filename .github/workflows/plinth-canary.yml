               never overwritten by `plinth update`. -->
          OLDSTOCKFIX
          MS="$(mktemp -d)"; ( cd "$MS" && git init -qb main . >/dev/null && "$GITHUB_WORKSPACE/bin/plinth" init "$MS" >/dev/null 2>&1 )
          cp "$OLDT" "$MS/CLAUDE.md"
          "$GITHUB_WORKSPACE/bin/plinth" update "$MS" >/dev/null 2>&1
          grep -qF "Plinth driver shell (version-pinned)" "$MS/CLAUDE.md" || { echo "::error::update did not regenerate a STOCK old CLAUDE.md to the shell"; exit 1; }
          # Custom notes REPLACING the placeholder -> preserved.
          MC="$(mktemp -d)"; ( cd "$MC" && git init -qb main . >/dev/null && "$GITHUB_WORKSPACE/bin/plinth" init "$MC" >/dev/null 2>&1 )
          sed 's/<!-- Anything unique to THIS project.*/CUSTOM: never touch migrations without approval./' "$OLDT" > "$MC/CLAUDE.md"
          "$GITHUB_WORKSPACE/bin/plinth" update "$MC" >/dev/null 2>&1
          grep -qF "never touch migrations" "$MC/CLAUDE.md" || { echo "::error::custom CLAUDE.md content lost on update"; exit 1; }
